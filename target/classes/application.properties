spring.application.name=CommonService

# Server Configuration
# Render sẽ set PORT env, local thì default 8081
server.port=${PORT:8081}

# MongoDB Configuration
# Dùng env MONGODB_URI để connect Atlas / Render
spring.data.mongodb.uri=mongodb+srv://admin:22102004@cluster0.fh2rx8k.mongodb.net/ttvv_common?retryWrites=true&w=majority&appName=Cluster0
spring.data.mongodb.auto-index-creation=false

# Data Seeding Configuration
# Set to true to enable data seeding on startup
# Set to false to disable seeding (useful after first run)
app.data.seed.enabled=false

# Security Configuration
# Set to false to disable authentication completely (for development/testing)
# Set to true to enable authentication (for production)
# Note: When enabled, SwaggerBypassFilter allows Swagger UI requests to bypass authentication
#       while other requests still require JWT token
app.security.enabled=false

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
# Resend Email Configuration
# Get your API key from: https://resend.com/api-keys
resend.api-key=re_7uQEVMLU_LecJvJThvfkRFNbuU9hAimP2
resend.from-email=onboarding@resend.dev

# Application Base URL (for reset password links)
app.base-url=http://localhost:5173


# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=uploads

# Redis Configuration (for tokens, cache, etc.)
# Set to true ONLY when you have Redis running.
# When false, app vẫn chạy bình thường, chỉ là không dùng refresh token lưu trong Redis.
app.token-store.enabled=false
spring.data.redis.host=localhost
spring.data.redis.port=9090
spring.data.redis.database=0

# OpenFeign default configuration
spring.cloud.openfeign.client.config.default.connectTimeout=5000
spring.cloud.openfeign.client.config.default.readTimeout=5000
spring.cloud.openfeign.client.config.default.loggerLevel=basic

# JWT Token expiration (milliseconds)
# Access token: 30 minutes
jwt.access-token-expiration=1800000
# Refresh token: 30 days
jwt.refresh-token-expiration=2592000000

# ============================
# Resilience4j / Circuit Breaker
# ============================

# Circuit breaker for calls from CommonService -> MessageService (via Feign)
resilience4j.circuitbreaker.instances.messageService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.messageService.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.messageService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.messageService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.messageService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.messageService.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.messageService.permittedNumberOfCallsInHalfOpenState=3

# Circuit breaker for external AI service (Gemini)
resilience4j.circuitbreaker.instances.aiService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.aiService.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.aiService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.aiService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.aiService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.aiService.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.aiService.permittedNumberOfCallsInHalfOpenState=3